<div id="calculator-widget" class="calculator hidden">
  <div class="calculator-header">
    <span>Calculator</span>
    <button id="close-calculator" class="close-btn">✕</button>
  </div>
  <input type="text" id="calc-display" disabled>
  <div class="calc-buttons">
    <button class="btn">7</button>
    <button class="btn">8</button>
    <button class="btn">9</button>
    <button class="btn op">÷</button>

    <button class="btn">4</button>
    <button class="btn">5</button>
    <button class="btn">6</button>
    <button class="btn op">×</button>

    <button class="btn">1</button>
    <button class="btn">2</button>
    <button class="btn">3</button>
    <button class="btn op">−</button>

    <button class="btn">0</button>
    <button class="btn">.</button>
    <button id="calc-clear" class="btn clear">C</button>
    <button class="btn op">+</button>

    <button id="calc-equal" class="btn equal">=</button>
  </div>
</div>

<!-- Floating Button -->
<button id="open-calculator" class="floating-btn">🖩</button>

<!-- include calculator assets -->
<link rel="stylesheet" href="{{ url_for('static', filename='calculator.css') }}">
<script src="{{ url_for('static', filename='calculator.js') }}" defer></script>
