<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edit Sale Item</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h2>Edit Sold Item</h2>
    <p><strong>Sale ID:</strong> {{ sale.id }} | <strong>Product:</strong> {{ product.name }}</p>
    <form method="post" action="{{ url_for('edit_sale_item', item_id=item.id) }}">
      <div>
        <label>Quantity</label>
        <input type="number" step="0.01" name="quantity" value="{{ item.quantity }}" required>
      </div>
      <div>
        <label>Unit Price</label>
        <input type="number" step="0.01" name="unit_price" value="{{ item.unit_price }}" required>
      </div>
      <div>
        <label>Sale Date & Time</label>
        <input type="datetime-local" name="sale_date" value="{{ sale.date.strftime('%Y-%m-%dT%H:%M') }}">
        <small class="muted">Change the sale date/time if you need to adjust when the sale occurred.</small>
      </div>
      <div>
        <button type="submit">Save Changes</button>
        <a href="{{ url_for('invoices') }}">Cancel</a>
      </div>
    </form>

    <hr>
    <form method="post" action="{{ url_for('delete_sale_item', item_id=item.id) }}" onsubmit="return confirm('Are you sure you want to delete this sold item? This will restore the product stock.');">
      <button type="submit" style="background-color:#c0392b;color:white;padding:8px 12px;border:none;">Delete Sold Item</button>
    </form>
  </div>
</body>
</html>
